name: VirtualUO
options:
  bundleIdPrefix: com.virtualuo
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    ENABLE_BITCODE: NO

targets:
  VirtualUO:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VirtualUO
    info:
      path: VirtualUO/Info.plist
      properties:
        CFBundleDisplayName: Virtual UO
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Virtual UO foloseste camera pentru experiente AR cu modele 3D educationale."
        NSPhotoLibraryUsageDescription: "Acces la galerie pentru capturile AR."
        NSMicrophoneUsageDescription: "Microfon pentru interactiuni AR."
        UIRequiredDeviceCapabilities:
          - arkit
          - armv7
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.virtualuo.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: ""
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies: []
